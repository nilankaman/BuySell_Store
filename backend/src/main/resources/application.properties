# Database
spring.datasource.url=jdbc:mysql://localhost:3306/buysell_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Server
server.port=8081

# JWT
jwt.secret=buysell_super_secret_key_minimum_256_bits_long_2025
jwt.expiry=86400000

# File uploads (for future use)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.buysell=INFO
logging.level.org.springframework.security=WARN
